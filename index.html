<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบตอบรับเข้าร่วมการประชุม</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/style.css" rel="stylesheet">
    <!-- Google Fonts (TH Sarabun New / สารบรรณ) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=TH+Sarabun+New:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'TH Sarabun New', sans-serif;
            font-size: 22px; /* ปรับขนาดฟอนต์สารบรรณให้อ่านง่าย */
            background-color: #f4f6f9;
            color: #333;
        }
        .card {
            border: none;
            border-top: 6px solid #0d6efd; /* เส้นสีน้ำเงินด้านบนเพิ่มความน่าเชื่อถือ */
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        .form-label {
            font-weight: bold;
        }
        .btn-submit {
            font-size: 22px;
            padding: 8px 30px;
        }
        /* ปรับแต่งความสวยงามของวิทยุ (Radio) */
        .form-check-input:checked {
            background-color: #0d6efd;
            border-color: #0d6efd;
        }
    </style>
</head>
<body>

<div class="container my-5">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">
            <div class="card p-4 p-md-5">
                <div class="text-center mb-4">
                    <h2 class="fw-bold text-primary">ระบบตอบรับเข้าร่วมการประชุม</h2>
                    <p class="text-muted">กรุณากรอกข้อมูลรายละเอียดเพื่อยืนยันการเข้าร่วมประชุม</p>
                    <hr>
                </div>

                <form id="registrationForm">
                    <!-- โรงเรียน -->
                    <div class="mb-3">
                        <label for="school" class="form-label">โรงเรียน / หน่วยงาน</label>
                        <input type="text" class="form-control" id="school" required placeholder="ระบุชื่อโรงเรียนหรือหน่วยงานของคุณ">
                    </div>

                    <!-- ชื่อ-สกุล -->
                    <div class="mb-3">
                        <label for="name" class="form-label">ชื่อ - สกุล ผู้เข้าประชุม</label>
                        <input type="text" class="form-control" id="name" required placeholder="คำนำหน้า ชื่อ และนามสกุล">
                    </div>

                    <!-- ตำแหน่ง -->
                    <div class="mb-3">
                        <label for="position" class="form-label">ตำแหน่ง</label>
                        <input type="text" class="form-control" id="position" required placeholder="เช่น ผู้อำนวยการโรงเรียน, ครู">
                    </div>

                    <!-- การตอบรับ -->
                    <div class="mb-4">
                        <label class="form-label d-block">การตอบรับเข้าร่วม</label>
                        <div class="form-check form-check-inline mt-2">
                            <input class="form-check-input" type="radio" name="status" id="statusStatus1" value="เข้าร่วมได้" checked>
                            <label class="form-check-label text-success fw-bold" for="statusStatus1">
                                🟢 สามารถเข้าร่วมได้
                            </label>
                        </div>
                        <div class="form-check form-check-inline mt-2">
                            <input class="form-check-input" type="radio" name="status" id="statusStatus2" value="ไม่สามารถเข้าร่วมได้">
                            <label class="form-check-label text-danger fw-bold" for="statusStatus2">
                                🔴 ไม่สามารถเข้าร่วมได้
                            </label>
                        </div>
                    </div>

                    <!-- ปุ่มกด -->
                    <div class="d-grid gap-2">
                        <button type="submit" id="submitBtn" class="btn btn-primary btn-submit">ส่งข้อมูลตอบรับ</button>
                    </div>
                </form>

                <!-- ข้อความแจ้งเตือนสถานะ -->
                <div id="responseMessage" class="mt-4 text-center d-none alert"></div>
            </div>
        </div>
    </div>
</div>

<!-- Bootstrap 5 JS Bundle -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
    // 🔴 วาง URL เว็บแอปของ Google Apps Script ที่ก๊อปปี้มาตรงนี้ครับ
    const GAS_URL = "https://script.google.com/macros/s/AKfycbwd8zHT1Tgl1ra_q4n5czsgE6_I3-PRMd6C8zZcsvFclRxLxQMM2695cXtSqvHdv31I/exec";

    document.getElementById('registrationForm').addEventListener('submit', function(e) {
        e.preventDefault();

        const submitBtn = document.getElementById('submitBtn');
        const responseMessage = document.getElementById('responseMessage');

        // แสดงสถานะกำลังโหลด
        submitBtn.disabled = true;
        submitBtn.innerText = 'กำลังส่งข้อมูล...';
        responseMessage.classList.add('d-none');

        // รวบรวมข้อมูลจากฟอร์ม
        const formData = {
            school: document.getElementById('school').value,
            name: document.getElementById('name').value,
            position: document.getElementById('position').value,
            status: document.querySelector('input[name="status"]:checked').value
        };

        // ส่งข้อมูลไปยัง GAS ผ่าน Fetch API
        fetch(GAS_URL, {
            method: 'POST',
            mode: 'no-cors', // ตั้งค่าเพื่อเลี่ยงปัญหา CORS บน GitHub Pages
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify(formData)
        })
        .then(() => {
            // เนื่องจากใช้โหมด no-cors จะไม่สามารถอ่านค่าผลลัพธ์ตรงๆ ได้ 
            // แต่ถ้าเข้าทำงานในบล็อกนี้แสดงว่าส่งข้อมูลสำเร็จแล้ว
            responseMessage.className = "mt-4 text-center alert alert-success";
            responseMessage.innerText = "🎉 บันทึกข้อมูลการตอบรับเรียบร้อยแล้ว ขอบคุณค่ะ";
            responseMessage.classList.remove('d-none');
            
            // รีเซ็ตฟอร์ม
            document.getElementById('registrationForm').reset();
            submitBtn.disabled = false;
            submitBtn.innerText = 'ส่งข้อมูลตอบรับ';
        })
        .catch(error => {
            console.error('Error:', error);
            responseMessage.className = "mt-4 text-center alert alert-danger";
            responseMessage.innerText = "❌ เกิดข้อผิดพลาด กรุณาลองใหม่อีกครั้ง";
            responseMessage.classList.remove('d-none');
            submitBtn.disabled = false;
            submitBtn.innerText = 'ส่งข้อมูลตอบรับ';
        });
    });
</script>
</body>
</html>
