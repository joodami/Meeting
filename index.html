<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบตอบรับเข้าร่วมการประชุม</title>
    
    <!-- Bootstrap 5.3 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Font Awesome 6.4 (สำหรับไอคอนสวยๆ) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Google Fonts - 'Sarabun' (ฟอนต์สารบรรณสไตล์เว็บบราวเซอร์ คมชัด โหลดไว) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        /* ตั้งค่าฟอนต์สารบรรณทั่วทั้งเว็บ */
        body {
            font-family: 'Sarabun', sans-serif;
            font-size: 16px;
            background: linear-gradient(135deg, #eef2f7 0%, #dfe7f0 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            color: #2c3e50;
        }

        /* ตกแต่งการ์ดหลัก */
        .card-container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.8);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.08);
            overflow: hidden;
            transition: all 0.3s ease;
        }

        /* แถบสีหัวมุมพรีเมียม */
        .card-top-bar {
            background: linear-gradient(90deg, #4f46e5 0%, #06b6d4 100%);
            height: 8px;
            width: 100%;
        }

        /* ตกแต่งหัวข้อหลัก */
        .header-title {
            font-weight: 700;
            color: #1e1b4b;
            letter-spacing: -0.5px;
        }

        .header-icon {
            background: linear-gradient(135deg, #e0e7ff 0%, #cffafe 100%);
            color: #4f46e5;
            width: 70px;
            height: 70px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            margin: 0 auto 15px;
            font-size: 30px;
        }

        /* ตกแต่งฟิลด์กรอกข้อมูลให้เห็นเด่นชัด */
        .form-floating > .form-control {
            border: 1.5px solid #d1d5db;
            border-radius: 12px;
            font-size: 16px;
            color: #1f2937;
            background-color: #f9fafb;
            transition: all 0.2s ease-in-out;
        }

        .form-floating > .form-control:focus {
            background-color: #ffffff;
            border-color: #4f46e5;
            box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.15);
        }

        .form-floating > label {
            color: #6b7280;
            padding-left: 15px;
        }

        /* ส่วนของการเลือกการตอบรับแบบ Card-Radio */
        .status-selector {
            border: 2px solid #e5e7eb;
            border-radius: 14px;
            padding: 15px;
            cursor: pointer;
            transition: all 0.25s ease;
            background-color: #fff;
            display: flex;
            align-items: center;
            position: relative;
        }

        .status-selector:hover {
            border-color: #cbd5e1;
            transform: translateY(-2px);
        }

        /* ปรับแต่งเมื่อเลือก เข้าร่วมได้ */
        input[type="radio"]:checked + .status-accept {
            border-color: #10b981;
            background-color: #ecfdf5;
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.1);
        }
        input[type="radio"]:checked + .status-accept i {
            color: #10b981;
        }

        /* ปรับแต่งเมื่อเลือก ไม่สามารถเข้าร่วมได้ */
        input[type="radio"]:checked + .status-decline {
            border-color: #ef4444;
            background-color: #fef2f2;
            box-shadow: 0 4px 12px rgba(239, 68, 68, 0.1);
        }
        input[type="radio"]:checked + .status-decline i {
            color: #ef4444;
        }

        /* ซ่อน Radio button ดั้งเดิมแต่ยังคงคุณสมบัติไว้ */
        .radio-hidden {
            position: absolute;
            opacity: 0;
            width: 0;
            height: 0;
        }

        /* ตกแต่งปุ่มส่งข้อมูล */
        .btn-submit {
            background: linear-gradient(90deg, #4f46e5 0%, #3b82f6 100%);
            border: none;
            border-radius: 12px;
            padding: 14px;
            font-size: 18px;
            font-weight: 600;
            color: #ffffff;
            box-shadow: 0 4px 15px rgba(79, 70, 229, 0.3);
            transition: all 0.25s ease;
        }

        .btn-submit:hover {
            background: linear-gradient(90deg, #4338ca 0%, #2563eb 100%);
            box-shadow: 0 6px 20px rgba(79, 70, 229, 0.4);
            transform: translateY(-1px);
        }

        .btn-submit:active {
            transform: translateY(1px);
        }

        /* ตกแต่งความสวยงามของ Modal */
        .modal-content {
            border-radius: 20px;
            border: none;
            overflow: hidden;
        }

        .modal-header-custom {
            padding: 30px 30px 10px;
            text-align: center;
            border: none;
        }

        .modal-body-custom {
            padding: 10px 30px 30px;
            text-align: center;
        }

        .modal-icon-success {
            color: #10b981;
            font-size: 65px;
            margin-bottom: 15px;
            animation: scaleUp 0.4s ease-out;
        }

        .modal-icon-error {
            color: #ef4444;
            font-size: 65px;
            margin-bottom: 15px;
            animation: scaleUp 0.4s ease-out;
        }

        .info-summary-box {
            background-color: #f8fafc;
            border-radius: 12px;
            padding: 15px;
            margin-top: 15px;
            text-align: left;
            border: 1px solid #e2e8f0;
        }

        /* เอฟเฟกต์แอนิเมชันสำหรับป๊อปอัป */
        @keyframes scaleUp {
            0% { transform: scale(0.5); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-7 col-md-9">
            
            <!-- การ์ดฟอร์มหลัก -->
            <div class="card-container">
                <div class="card-top-bar"></div>
                
                <div class="p-4 p-md-5">
                    
                    <!-- ส่วนหัวฟอร์มสวยงาม -->
                    <div class="text-center mb-5">
                        <div class="header-icon">
                            <i class="fa-regular fa-calendar-check"></i>
                        </div>
                        <h2 class="header-title mb-2">ระบบตอบรับเข้าร่วมการประชุม</h2>
                        <p class="text-muted mb-0">กรุณากรอกข้อมูลเพื่อแจ้งสถานะและบันทึกการตอบรับเข้าร่วมการประชุมของคุณ</p>
                    </div>

                    <!-- เริ่มแบบฟอร์มพร้อมตั้งค่า Validation -->
                    <form id="registrationForm" class="needs-validation" novalidate>
                        
                        <!-- 1. โรงเรียน / หน่วยงาน -->
                        <div class="form-floating mb-4">
                            <input type="text" class="form-control" id="school" placeholder="ระบุหน่วยงานของคุณ" required>
                            <label for="school"><i class="fa-solid fa-school me-2 text-primary"></i>โรงเรียน / หน่วยงาน</label>
                            <div class="invalid-feedback text-danger mt-1 fs-6">
                                <i class="fa-solid fa-circle-exclamation me-1"></i> กรุณากรอกชื่อโรงเรียนหรือหน่วยงานของคุณ
                            </div>
                        </div>

                        <!-- 2. ชื่อ-สกุล -->
                        <div class="form-floating mb-4">
                            <input type="text" class="form-control" id="name" placeholder="ชื่อ และนามสกุล" required>
                            <label for="name"><i class="fa-solid fa-user me-2 text-primary"></i>ชื่อ - สกุล ผู้เข้าประชุม</label>
                            <div class="invalid-feedback text-danger mt-1 fs-6">
                                <i class="fa-solid fa-circle-exclamation me-1"></i> กรุณากรอกชื่อและนามสกุลของคุณ
                            </div>
                        </div>

                        <!-- 3. ตำแหน่ง -->
                        <div class="form-floating mb-4">
                            <input type="text" class="form-control" id="position" placeholder="ระบุตำแหน่ง" required>
                            <label for="position"><i class="fa-solid fa-id-card me-2 text-primary"></i>ตำแหน่ง</label>
                            <div class="invalid-feedback text-danger mt-1 fs-6">
                                <i class="fa-solid fa-circle-exclamation me-1"></i> กรุณากรอกตำแหน่งการทำงานของคุณ
                            </div>
                        </div>

                        <!-- 4. ตัวเลือกการตอบรับ (แบบการ์ดปุ่มกดที่ชัดเจน) -->
                        <div class="mb-5">
                            <label class="form-label fw-bold mb-3 text-secondary" style="font-size: 15px; letter-spacing: 0.5px; text-transform: uppercase;">
                                การตอบรับเข้าร่วมการประชุม
                            </label>
                            
                            <div class="row g-3">
                                <!-- ตัวเลือก: เข้าร่วม -->
                                <div class="col-md-6">
                                    <input class="radio-hidden" type="radio" name="status" id="statusAccept" value="เข้าร่วมได้" checked>
                                    <label class="status-selector status-accept w-100" for="statusAccept">
                                        <div class="fs-4 me-3 text-secondary"><i class="fa-solid fa-circle-check"></i></div>
                                        <div>
                                            <div class="fw-bold text-success fs-5">สามารถเข้าร่วมได้</div>
                                            <small class="text-muted">ยืนยันลงทะเบียนเข้าประชุมตามกำหนดการ</small>
                                        </div>
                                    </label>
                                </div>
                                
                                <!-- ตัวเลือก: ไม่สะดวกเข้าร่วม -->
                                <div class="col-md-6">
                                    <input class="radio-hidden" type="radio" name="status" id="statusDecline" value="ไม่สามารถเข้าร่วมได้">
                                    <label class="status-selector status-decline w-100" for="statusDecline">
                                        <div class="fs-4 me-3 text-secondary"><i class="fa-solid fa-circle-xmark"></i></div>
                                        <div>
                                            <div class="fw-bold text-danger fs-5">ไม่สามารถเข้าร่วมได้</div>
                                            <small class="text-muted">ขอสละสิทธิ์เนื่องจากติดภารกิจอื่น</small>
                                        </div>
                                    </label>
                                </div>
                            </div>
                        </div>

                        <!-- ปุ่มกดส่งข้อมูล -->
                        <div class="d-grid">
                            <button type="submit" id="submitBtn" class="btn btn-submit">
                                <i class="fa-solid fa-paper-plane me-2"></i> ส่งข้อมูลบันทึกการตอบรับ
                            </button>
                        </div>
                    </form>

                </div>
            </div>

        </div>
    </div>
</div>

<!-- ================= MODALS ตกแต่งสวยงามเมื่อทำรายการสำเร็จ ================= -->
<div class="modal fade" id="statusModal" tabindex="-1" aria-hidden="true" data-bs-backdrop="static">
    <div class="modal-dialog modal-dialog-centric">
        <div class="modal-content">
            
            <div class="modal-header-custom" id="modalHeaderArea">
                <!-- ไอคอนจะถูกเปลี่ยนแบบ Dynamic ผ่าน JS -->
                <div id="modalIcon"></div>
                <h3 class="fw-bold" id="modalTitle">แจ้งเตือน</h3>
            </div>
            
            <div class="modal-body-custom">
                <p class="text-muted mb-3" id="modalMessage">รายละเอียดการตอบรับข้อมูลของคุณ</p>
                
                <!-- กล่องสรุปผลข้อมูลที่ส่งเพื่อความมั่นใจของผู้ใช้งาน -->
                <div class="info-summary-box" id="modalSummaryBox">
                    <div class="mb-2"><strong><i class="fa-solid fa-school text-muted me-2"></i>หน่วยงาน:</strong> <span id="sumSchool"></span></div>
                    <div class="mb-2"><strong><i class="fa-solid fa-user text-muted me-2"></i>ผู้ส่ง:</strong> <span id="sumName"></span></div>
                    <div class="mb-2"><strong><i class="fa-solid fa-id-card text-muted me-2"></i>ตำแหน่ง:</strong> <span id="sumPosition"></span></div>
                    <div><strong><i class="fa-solid fa-circle-info text-muted me-2"></i>การตอบรับ:</strong> <span id="sumStatus" class="badge"></span></div>
                </div>
                
                <div class="mt-4 d-grid">
                    <button type="button" class="btn btn-dark py-2 rounded-3" data-bs-dismiss="modal">ตกลงและรับทราบ</button>
                </div>
            </div>
            
        </div>
    </div>
</div>

<!-- Bootstrap 5 JS Bundle (รวม Popper) -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
    // 🔴 กรุณานำ URL เว็บแอปของ Google Apps Script ที่ Deploy เสร็จแล้วมาใส่ไว้ที่ช่องด้านล่างนี้แทนที่ข้อความเดิมครับ
    const GAS_URL = "https://script.google.com/macros/s/AKfycbwd8zHT1Tgl1ra_q4n5czsgE6_I3-PRMd6C8zZcsvFclRxLxQMM2695cXtSqvHdv31I/exec";

    // จัดการเหตุการณ์เมื่อผู้ใช้ส่งฟอร์มข้อมูล
    document.getElementById('registrationForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const form = e.target;
        const submitBtn = document.getElementById('submitBtn');
        
        // 1. ระบบยืนยันข้อมูล Validation: ถ้ากรอกไม่ครบจะแสดงแจ้งเตือนทันที
        if (!form.checkValidity()) {
            e.stopPropagation();
            form.classList.add('was-validated');
            return; // หยุดการทำงานถ้ากรอกข้อมูลไม่ครบ
        }
        
        // 2. ถ้าข้อมูลครบถ้วน: เริ่มกระบวนการส่งข้อมูลไปยังหลังบ้าน GAS
        submitBtn.disabled = true;
        submitBtn.innerHTML = '<span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span> กำลังส่งข้อมูลเข้าระบบ...';

        // เก็บรวบรวมข้อมูลลงใน Object
        const formData = {
            school: document.getElementById('school').value.trim(),
            name: document.getElementById('name').value.trim(),
            position: document.getElementById('position').value.trim(),
            status: document.querySelector('input[name="status"]:checked').value
        };

        // ส่งข้อมูลแบบ POST ไปยัง Google Apps Script (GAS)
        fetch(GAS_URL, {
            method: 'POST',
            mode: 'no-cors', // บายพาสเรื่อง CORS สำหรับเว็บ GitHub Pages
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify(formData)
        })
        .then(() => {
            // ดำเนินการเมื่อส่งสำเร็จ: นำข้อมูลไปโชว์สรุปบน Modal ก่อน
            document.getElementById('sumSchool').innerText = formData.school;
            document.getElementById('sumName').innerText = formData.name;
            document.getElementById('sumPosition').innerText = formData.position;
            
            const badgeStatus = document.getElementById('sumStatus');
            badgeStatus.innerText = formData.status;
            if (formData.status === "เข้าร่วมได้") {
                badgeStatus.className = "badge bg-success-subtle text-success fs-6 px-3 py-2";
            } else {
                badgeStatus.className = "badge bg-danger-subtle text-danger fs-6 px-3 py-2";
            }

            // แสดงการตกแต่ง Modal ฝั่ง Success
            document.getElementById('modalIcon').innerHTML = '<div class="modal-icon-success"><i class="fa-solid fa-circle-check"></i></div>';
            document.getElementById('modalTitle').className = "fw-bold text-success";
            document.getElementById('modalTitle').innerText = "บันทึกการส่งสำเร็จ!";
            document.getElementById('modalMessage').innerText = "เราได้บันทึกข้อมูลการลงทะเบียนเข้าร่วมประชุมของคุณเรียบร้อยแล้ว";
            document.getElementById('modalSummaryBox').classList.remove('d-none');

            // เรียกให้ป๊อปอัปแจ้งเตือนสวยงามเด้งขึ้นมา
            const statusModal = new bootstrap.Modal(document.getElementById('statusModal'));
            statusModal.show();
            
            // เคลียร์ค่าในฟอร์มเพื่อรองรับผู้สมัครรายถัดไป
            form.reset();
            form.classList.remove('was-validated');
            
            // รีเซ็ตปุ่มให้กลับมาพร้อมใช้
            submitBtn.disabled = false;
            submitBtn.innerHTML = '<i class="fa-solid fa-paper-plane me-2"></i> ส่งข้อมูลบันทึกการตอบรับ';
        })
        .catch(error => {
            console.error('Error:', error);
            
            // แสดงกรณีระบบขัดข้องหรือเน็ตเวิร์กมีปัญหา
            document.getElementById('modalIcon').innerHTML = '<div class="modal-icon-error"><i class="fa-solid fa-circle-exclamation"></i></div>';
            document.getElementById('modalTitle').className = "fw-bold text-danger";
            document.getElementById('modalTitle').innerText = "เกิดข้อผิดพลาดในการส่ง";
            document.getElementById('modalMessage').innerText = "ระบบไม่สามารถเชื่อมต่อเซิร์ฟเวอร์เพื่อบันทึกข้อมูลได้ กรุณาลองใหม่อีกครั้ง";
            document.getElementById('modalSummaryBox').classList.add('d-none');

            const statusModal = new bootstrap.Modal(document.getElementById('statusModal'));
            statusModal.show();
            
            submitBtn.disabled = false;
            submitBtn.innerHTML = '<i class="fa-solid fa-paper-plane me-2"></i> ส่งข้อมูลบันทึกการตอบรับ';
        });
    });
</script>
</body>
</html>
`
